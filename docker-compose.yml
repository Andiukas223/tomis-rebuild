services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://tomis:tomis_dev_password@db:5432/tomis_rebuild?schema=public
      SESSION_SECRET: change-me-before-production
      COOKIE_SECURE: "false"
      SERVICE_ATTACHMENTS_DIR: /app/storage/service-attachments
    volumes:
      - ./storage:/app/storage

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tomis
      POSTGRES_PASSWORD: tomis_dev_password
      POSTGRES_DB: tomis_rebuild
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tomis -d tomis_rebuild"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
